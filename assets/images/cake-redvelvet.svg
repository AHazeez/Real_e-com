<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 260" width="100%" height="100%">
  <defs>
    <radialGradient id="bg-grad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FAF5F0" />
      <stop offset="100%" stop-color="#F2DFE1" />
    </radialGradient>
  </defs>
  <!-- Background circle -->
  <circle cx="150" cy="130" r="110" fill="url(#bg-grad)" />
  
  <!-- Shadow -->
  <ellipse cx="150" cy="205" rx="90" ry="15" fill="#4A1521" opacity="0.15" />
  
  <!-- Stand -->
  <path d="M 100 200 L 200 200 L 170 220 L 130 220 Z" fill="#E8DCDD" />
  <ellipse cx="150" cy="200" rx="95" ry="10" fill="#FFFFFF" />

  <!-- Cake Base Body (Crimson red) -->
  <path d="M 70 140 L 70 185 A 80 15 0 0 0 230 185 L 230 140 Z" fill="#800F2F" />
  
  <!-- Center Cream cheese Layer -->
  <path d="M 70 160 A 80 15 0 0 0 230 160 L 230 164 A 80 15 0 0 1 70 164 Z" fill="#FDFBF7" />
  
  <ellipse cx="150" cy="140" rx="80" ry="15" fill="#FDFBF7" />

  <!-- Red Crumbs on Top of White Frosting -->
  <circle cx="110" cy="142" r="3" fill="#A4133C" />
  <circle cx="125" cy="138" r="2" fill="#FFB3C1" />
  <circle cx="130" cy="144" r="3" fill="#800F2F" />
  <circle cx="145" cy="135" r="4" fill="#A4133C" />
  <circle cx="150" cy="141" r="2.5" fill="#FDFBF7" />
  <circle cx="160" cy="137" r="3.5" fill="#800F2F" />
  <circle cx="170" cy="143" r="2" fill="#FFB3C1" />
  <circle cx="185" cy="140" r="3" fill="#A4133C" />

  <!-- White Frosting Swirls around edge -->
  <path d="M 70 140 Q 75 130 80 140" stroke="#FDFBF7" stroke-width="6" fill="none" />
  <path d="M 80 140 Q 85 130 90 140" stroke="#FDFBF7" stroke-width="6" fill="none" />
  <path d="M 90 140 Q 95 130 100 140" stroke="#FDFBF7" stroke-width="6" fill="none" />
  <path d="M 200 140 Q 205 130 210 140" stroke="#FDFBF7" stroke-width="6" fill="none" />
  <path d="M 210 140 Q 215 130 220 140" stroke="#FDFBF7" stroke-width="6" fill="none" />
  <path d="M 220 140 Q 225 130 230 140" stroke="#FDFBF7" stroke-width="6" fill="none" />
</svg>
