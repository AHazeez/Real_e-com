<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register Account - Wake Cake</title>
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body style="background-color: var(--color-bg-cream); min-height: 100vh; display:flex; flex-direction:column; justify-content:space-between;">

    <!-- Minimal Header -->
    <header style="border-bottom: 1px solid var(--color-sand-border);">
        <div class="container navbar" style="height: 70px;">
            <a href="index.html" class="logo">
                <span class="logo-icon">🍰</span>
                <span>Wake Cake</span>
            </a>
            <a href="products.html" style="font-size:14px; font-weight:600; color:var(--color-primary-chocolate);">← Back to Store</a>
        </div>
    </header>

    <!-- Register Box -->
    <main class="container">
        <div class="auth-wrapper">
            <div class="auth-header">
                <h1 class="auth-title">Create Account</h1>
                <p class="auth-subtitle">Join us to order customized cakes and collect rewards.</p>
            </div>
            
            <form id="register-form">
                <div class="form-group">
                    <label class="form-label" for="reg-name">Full Name</label>
                    <input type="text" id="reg-name" required class="form-control" placeholder="John Doe">
                </div>
                
                <div class="form-group">
                    <label class="form-label" for="reg-email">Email Address</label>
                    <input type="email" id="reg-email" required class="form-control" placeholder="john@example.com">
                </div>
                
                <div class="form-group">
                    <label class="form-label" for="reg-password">Password</label>
                    <input type="password" id="reg-password" required class="form-control" placeholder="•••••••• (Min 8 chars)">
                </div>

                <div class="form-group" style="margin-bottom:24px;">
                    <label style="display:flex; align-items:flex-start; gap:8px; cursor:pointer; font-size:13px; line-height:1.4;">
                        <input type="checkbox" required style="margin-top:2px;">
                        <span>I accept the Wake Cake Terms of Service and Privacy Policy.</span>
                    </label>
                </div>

                <button type="submit" class="btn btn-primary" style="width:100%; height:46px; margin-bottom: 20px;">Register</button>
            </form>

            <div style="text-align: center; font-size: 14px; color: var(--color-text-muted);">
                Already have an account? <a href="login.html" class="form-link">Login here</a>
            </div>
        </div>
    </main>

    <!-- Footer copyright -->
    <footer style="padding: 24px 0; background-color: var(--color-primary-chocolate); color: var(--color-white); font-size: 13px; text-align: center; opacity: 0.95;">
        <p>&copy; 2026 Wake Cake Bakery. All rights reserved.</p>
    </footer>

    <!-- API and Scripts -->
    <script src="assets/js/config.js"></script>
    <script src="assets/js/api.js"></script>
    <script src="assets/js/main.js"></script>
    <script>
        document.getElementById('register-form').onsubmit = async (e) => {
            e.preventDefault();
            const name = document.getElementById('reg-name').value.trim();
            const email = document.getElementById('reg-email').value.trim();
            const password = document.getElementById('reg-password').value;

            if (password.length < 8) {
                window.showToast('Password must be at least 8 characters long.', 'error');
                return;
            }

            try {
                await window.wakeCakeAPI.registerUser({ name, email, password });
                window.showToast('Account created successfully!', 'success');
                setTimeout(() => {
                    window.location.href = 'login.html';
                }, 1000);
            } catch (error) {
                window.showToast(error.message || 'Registration failed.', 'error');
            }
        };
    </script>
</body>
</html>
