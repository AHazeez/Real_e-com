<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Products - Wake Cake Admin</title>
    <link rel="stylesheet" href="../assets/css/admin.css">
</head>
<body>

    <!-- Mobile Header -->
    <div class="admin-mobile-header">
        <div style="font-weight:700; font-size:18px;">🍰 Wake Cake Admin</div>
        <button class="admin-hamburger" aria-label="Toggle Sidebar">☰</button>
    </div>

    <div class="admin-container">
        <!-- Sidebar -->
        <aside class="admin-sidebar">
            <div class="sidebar-brand">
                <span>🍰</span>
                <span>Wake Cake <span class="brand-orange">Admin</span></span>
            </div>
            <ul class="sidebar-menu">
                <li class="sidebar-item"><a href="dashboard.html" class="sidebar-link"><span>📊</span> Dashboard</a></li>
                <li class="sidebar-item"><a href="products.html" class="sidebar-link active"><span>🎂</span> Products</a></li>
                <li class="sidebar-item"><a href="orders.html" class="sidebar-link"><span>🛒</span> Orders</a></li>
                <li class="sidebar-item"><a href="inventory.html" class="sidebar-link"><span>📦</span> Inventory</a></li>
                <li class="sidebar-item"><a href="customers.html" class="sidebar-link"><span>👥</span> Customers</a></li>
                <li class="sidebar-item"><a href="reports.html" class="sidebar-link"><span>📈</span> Reports</a></li>
                <li class="sidebar-item"><a href="settings.html" class="sidebar-link"><span>⚙️</span> Settings</a></li>
            </ul>
            <div style="padding: 20px; border-top: 1px solid rgba(255,255,255,0.08);">
                <a href="#" id="admin-logout-btn" class="sidebar-link" style="padding:0; color:#E07A5F;"><span>🚪</span> Logout</a>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="admin-content">
            <!-- Header -->
            <header class="admin-header">
                <div class="header-title">
                    <h1>Products Management</h1>
                </div>
                <div class="header-actions">
                    <button id="theme-toggle-btn" class="theme-toggle">🌙</button>
                    <button id="btn-add-product" class="btn-admin btn-admin-primary">➕ Add Product</button>
                </div>
            </header>

            <!-- Products Catalog table card -->
            <div class="card">
                <div class="card-header">
                    <h2 class="card-title">Cake Catalog</h2>
                </div>
                <div class="card-body">
                    <div class="table-responsive">
                        <table class="data-table">
                            <thead>
                                <tr>
                                    <th>Image</th>
                                    <th>Name</th>
                                    <th>Category</th>
                                    <th>Price</th>
                                    <th>Stock</th>
                                    <th>Status</th>
                                    <th>Actions</th>
                                </tr>
                            </thead>
                            <tbody id="admin-products-table-body">
                                <!-- Loaded dynamically by admin.js -->
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Add/Edit Product Modal Backdrop -->
    <div id="modal-product" class="modal-backdrop">
        <div class="modal">
            <div class="modal-header">
                <h3 id="modal-title-product" class="modal-title">Add New Product</h3>
                <button class="modal-close" onclick="closeModal('modal-product')">&times;</button>
            </div>
            <form id="product-form">
                <div class="modal-body">
                    <input type="hidden" id="prod-form-id">
                    
                    <div class="form-group">
                        <label for="prod-form-name">Product Name *</label>
                        <input type="text" id="prod-form-name" required class="form-control-admin" placeholder="e.g. Lemon Mousse cake">
                    </div>

                    <div class="form-grid">
                        <div class="form-group">
                            <label for="prod-form-category">Category *</label>
                            <select id="prod-form-category" class="form-control-admin">
                                <option value="Birthday Cakes">Birthday Cakes</option>
                                <option value="Wedding Cakes">Wedding Cakes</option>
                                <option value="Chocolate Cakes">Chocolate Cakes</option>
                                <option value="Fruit Cakes">Fruit Cakes</option>
                                <option value="Cupcakes">Cupcakes</option>
                                <option value="Custom Cakes">Custom Cakes</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="prod-form-status">Status *</label>
                            <select id="prod-form-status" class="form-control-admin">
                                <option value="Active">Active</option>
                                <option value="Inactive">Inactive</option>
                            </select>
                        </div>
                    </div>

                    <div class="form-grid">
                        <div class="form-group">
                            <label for="prod-form-price">Price ($) *</label>
                            <input type="number" step="0.01" id="prod-form-price" required class="form-control-admin" placeholder="0.00">
                        </div>
                        <div class="form-group">
                            <label for="prod-form-stock">Stock Quantity *</label>
                            <input type="number" id="prod-form-stock" required class="form-control-admin" placeholder="0">
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="prod-form-desc">Product Description *</label>
                        <textarea id="prod-form-desc" rows="3" required class="form-control-admin" placeholder="Cake description, toppings details..."></textarea>
                    </div>

                    <div class="form-group">
                        <label for="prod-form-image">Product Image</label>
                        <input type="file" id="prod-form-image" class="form-control-admin" accept="image/png, image/jpeg, image/webp">
                    </div>

                    <div class="form-group">
                        <label for="prod-form-ingr">Ingredients & Allergens</label>
                        <textarea id="prod-form-ingr" rows="2" class="form-control-admin" placeholder="List of ingredients, gluten-free, contains eggs..."></textarea>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn-admin btn-admin-secondary" onclick="closeModal('modal-product')">Cancel</button>
                    <button type="submit" class="btn-admin btn-admin-primary">Save Product</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Database and Admin scripts -->
    <script src="../assets/js/config.js"></script>
    <script src="../assets/js/api.js"></script>
    <script src="../assets/js/admin.js"></script>
</body>
</html>
