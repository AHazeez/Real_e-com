<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - Wake Cake</title>
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body style="background-color: var(--color-bg-cream); min-height: 100vh; display:flex; flex-direction:column; justify-content:space-between;">

    <!-- Minimal Header -->
    <header style="border-bottom: 1px solid var(--color-sand-border);">
        <div class="container navbar" style="height: 70px;">
            <a href="index.html" class="logo">
                <span class="logo-icon">🍰</span>
                <span>Wake Cake</span>
            </a>
            <a href="login.html" style="font-size:14px; font-weight:600; color:var(--color-primary-chocolate);">← Back to Login</a>
        </div>
    </header>

    <!-- Forgot Password Box -->
    <main class="container">
        <div class="auth-wrapper">
            <div class="auth-header">
                <h1 class="auth-title">Reset Password</h1>
                <p class="auth-subtitle">Enter your email and we'll send you recovery details.</p>
            </div>
            
            <form id="forgot-form" onsubmit="event.preventDefault(); window.showToast('Password reset link sent to your email!', 'success'); document.getElementById('forgot-email').value='';">
                <div class="form-group" style="margin-bottom:24px;">
                    <label class="form-label" for="forgot-email">Email Address</label>
                    <input type="email" id="forgot-email" required class="form-control" placeholder="john@example.com">
                </div>

                <button type="submit" class="btn btn-primary" style="width:100%; height:46px;">Send Recovery Link</button>
            </form>
        </div>
    </main>

    <!-- Footer copyright -->
    <footer style="padding: 24px 0; background-color: var(--color-primary-chocolate); color: var(--color-white); font-size: 13px; text-align: center; opacity: 0.95;">
        <p>&copy; 2026 Wake Cake Bakery. All rights reserved.</p>
    </footer>

    <!-- Database and Scripts -->
    <script src="assets/js/config.js"></script>
    <script src="assets/js/api.js"></script>
    <script src="assets/js/main.js"></script>
</body>
</html>
